<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Scorcho</title>
  <link rel="icon" href="favicon.png">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
      font-family: sans-serif;
    }

    .page-content {
      position: absolute;
      top: 10px;
      left: 10px;
      color: transparent;
      font-size: 12px;
      z-index: 2;
    }
    .video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: none;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- This is the trick -->
  <div class="page-content">El Scorcho</div>

  <iframe 
    class="video"
    src="https://www.youtube.com/embed/okthJIVbi6g?autoplay=1&rel=0&modestbranding=1"
    title="El Scorcho"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>

</body>
</html>
